name: Deploy - coderider despliegue

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Desplegar a producción
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias y ejecutar tests
        run: |
          npm install
          npm test

      - name: Despliegue de la aplicación
        run: |
          VERSION=$(node -p "require('./package.json').version")

          echo "Iniciando despliegue de aplicación coderider v $VERSION"
          echo "Sistema desplegado exitosamente 🚀"
          echo "URL: http://streamflow.example.com"
